# Nginx Reverse Proxy Configuration
# For production deployment with SSL/TLS support

upstream backend {
    server backend:5000;
}

upstream frontend {
    server frontend:3000;
}

# ============================================================
# HTTP Server (Redirect to HTTPS)
# ============================================================
server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# ============================================================
# HTTPS Server (Production)
# ============================================================
server {
    listen 443 ssl http2;
    server_name remitbikas.com;  # Change to your domain
    client_max_body_size 10M;

    # SSL Certificates (from Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/remitbikas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/remitbikas.com/privkey.pem;

    # SSL Configuration (A+ Rating)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    # ============================================================
    # Frontend Routes
    # ============================================================
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Websocket support
        proxy_read_timeout 86400;
    }

    # ============================================================
    # API Routes
    # ============================================================
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================================================
    # Static Files (with Caching)
    # ============================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache static assets for 1 year
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ============================================================
    # Uploads
    # ============================================================
    location /uploads/ {
        proxy_pass http://backend/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache uploads for 30 days
        expires 30d;
        add_header Cache-Control "public";
    }

    # ============================================================
    # Health Check
    # ============================================================
    location /health {
        proxy_pass http://backend/health;
        access_log off;
    }

    # ============================================================
    # Deny Access to Sensitive Files
    # ============================================================
    location ~ /\.git {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    location ~ /config {
        deny all;
    }
}

# ============================================================
# Development Server (HTTP only)
# ============================================================
server {
    listen 8080;
    server_name localhost 127.0.0.1;
    client_max_body_size 10M;

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://backend/health;
        access_log off;
    }
}

version: '3.8'

# ============================================================
# Production Setup with Nginx Reverse Proxy
# ============================================================
# This configuration includes:
#  - Nginx reverse proxy with SSL/TLS support
#  - Production backend
#  - Production frontend
#  - PostgreSQL database
#  - Health checks and resource limits

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: remitbikas_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot-webroot:/var/www/certbot:ro
      # Nginx cache
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - remitbikas_network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: remitbikas_db
    environment:
      POSTGRES_USER: ${DB_USER:-remitbikas}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-remitbikas123}
      POSTGRES_DB: ${DB_NAME:-remitbikas}
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - remitbikas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remitbikas"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: remitbikas_backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-remitbikas}:${DB_PASSWORD:-remitbikas123}@postgres:5432/${DB_NAME:-remitbikas}
      JWT_SECRET: ${JWT_SECRET:-your_secret_key}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://remitbikas.com}
      UPLOAD_DIR: /app/uploads
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - remitbikas_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: remitbikas_frontend
    environment:
      NODE_ENV: production
      VITE_API_URL: https://remitbikas.com/api
    depends_on:
      - backend
    networks:
      - remitbikas_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  postgres_data:
  backend_uploads:
  nginx_cache:

networks:
  remitbikas_network:
    driver: bridge
